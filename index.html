<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HICC 갤러리</title>
    
</head>
<body>
    <div id="app">

        <section id="listPage">
            <div class="board-header">
                <h2>전체글 보기</h2>
                <button type="button" class="btn-main">글쓰기</button>
            </div>
            <table class="board-table">
                <thead>
                    <tr>
                        <th>번호</th>
                        <th>제목</th>
                        <th>글쓴이</th>
                    </tr>
                </thead>
                <tbody id="postList"></tbody>
            </table>
        </section>
    
        <section id="detailPage">
            <div class="detail-header">
                <h3 id="viewTitle">게시글 제목 영역</h3>
                <div class="info">작성자: <span id="viewAuthor">이름</span></div>
            </div>
            <div id="viewContent" class="detail-content">
                본문 내용
            </div>
            <button type="button" class="btn-sub">목록으로</button>
        </section>
    
        <section id="writePage">
            <div class="write-header">
                <h3>새 글 작성</h3>
            </div>
            <div class="write-form">
                <input type="text" id="inputTitle" placeholder="제목">
                <input type="text" id="inputAuthor" placeholder="작성자">
                <textarea id="inputContent" placeholder="내용을 입력하세요"></textarea>
                <div class="write-btns">
                    <button type="button" class="btn-sub">취소</button>
                    <button type="button" class="btn-main">등록</button>
                </div>
            </div>
        </section>
        
    </div>
    
    </body>
</html>
